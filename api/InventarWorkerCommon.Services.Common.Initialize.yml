  assemblies:
  - InventarWorkerCommon
  namespace: InventarWorkerCommon.Services.Common
  summary: >-
    Initializes and configures essential services required by the application, including API service,

    SQLite database service, and MongoDB service.
  example: []
  syntax:
    content: public static ServiceContainer Services(string clientApiFqdn = "localhost", string clientApiPort = "80", string mongoDbFqdn = "localhost", string mongoDbPort = "27017", string pgSqlDbFqdn = "localhost", string pgSqlDbPort = "5432", string pgSqlDbName = "inventar")
    parameters:
    - id: clientApiFqdn
      type: System.String
      description: The fully qualified domain name of the client API. The default is "localhost".
    - id: clientApiPort
      type: System.String
      description: The port on which the client API is running. The default is "80".
    - id: mongoDbFqdn
      type: System.String
      description: The fully qualified domain name of the MongoDB server. The default is "localhost".
    - id: mongoDbPort
      type: System.String
      description: The port on which the MongoDB server is running. The default is "27017".
    - id: pgSqlDbFqdn
      type: System.String
      description: The fully qualified domain name of the PostgreSQL database server. The default is "localhost".
    - id: pgSqlDbPort
      type: System.String
      description: The port on which the PostgreSQL database server is running. The default is "5432".
    - id: pgSqlDbName
      type: System.String
      description: The name of the PostgreSQL database to be used. The default is "inventar".
    return:
      type: InventarWorkerCommon.Services.Common.ServiceContainer
      description: A disposable container with the initialized instances of services.
    content.vb: Public Shared Function Services(clientApiFqdn As String = "localhost", clientApiPort As String = "80", mongoDbFqdn As String = "localhost", mongoDbPort As String = "27017", pgSqlDbFqdn As String = "localhost", pgSqlDbPort As String = "5432", pgSqlDbName As String = "inventar") As ServiceContainer
