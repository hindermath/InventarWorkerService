  summary: >-
    Calculates the average processing time per item based on the total number of processed items

    and the start time of the operation.
  example: []
  syntax:
    content: public static double CalculateAverageProcessingTime(this int processedItems, DateTime startTime)
    parameters:
    - id: processedItems
      type: System.Int32
      description: The total number of items that have been processed.
    - id: startTime
      type: System.DateTime
      description: The start time of the operation used to calculate the processing duration.
    return:
      type: System.Double
      description: The average processing time per item, in milliseconds. Returns 0 if no items have been processed.
