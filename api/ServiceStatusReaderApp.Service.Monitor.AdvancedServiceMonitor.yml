  type: Method
  source:
    remote:
      path: ServiceStatusReaderApp/Service/Monitor/AdvancedServiceMonitor.cs
      branch: main
      repo: https://github.com/hindermath/InventarWorkerService.git
    id: WatchForChanges
    path: ServiceStatusReaderApp/Service/Monitor/AdvancedServiceMonitor.cs
    startLine: 21
  assemblies:
  - ServiceStatusReaderApp
  namespace: ServiceStatusReaderApp.Service.Monitor
  summary: >-
    Starts monitoring a designated directory for changes to JSON files.

    When a change is detected, the method logs the file name of the modified file and displays the current service status.

    The directory being monitored is determined by the path provided by the <xref href="InventarWorkerCommon.Services.Paths.ServicePath.GetServiceStatusPath" data-throw-if-not-resolved="false"></xref> method.

    File changes are tracked based on the last write time. When a change occurs, the service status is read using

    the <xref href="InventarWorkerCommon.Services.Status.ServiceStatusReader" data-throw-if-not-resolved="false"></xref> and logged to the console.

    This method blocks execution until a key is pressed, after which it disposes of the monitoring resources and exits.
  example: []
  syntax:
    content: public void WatchForChanges()
    content.vb: Public Sub WatchForChanges()
  overload: ServiceStatusReaderApp.Service.Monitor.AdvancedServiceMonitor.WatchForChanges*
