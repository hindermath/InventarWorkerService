  summary: >-
    Resolves the given IP address to its host information, including host name, aliases,

    and associated IP address list. Provides detailed error information in case of failure.
  example: []
  syntax:
    content: public static Task<HostInformationResult> ResolveIpToHostInfoAsync(string ipAddress, bool preferIPv4 = true, int timeout = 5000)
    parameters:
    - id: ipAddress
      type: System.String
      description: The IP address to resolve to a host.
    - id: preferIPv4
      type: System.Boolean
      description: Indicates whether IPv4 addresses should be prioritized when resolving the FQDN. Default is true.
    - id: timeout
      type: System.Int32
      description: The maximum time, in milliseconds, to wait for the host resolution process. Default is 5000ms.
    return:
      type: System.Threading.Tasks.Task{InventarWorkerCommon.Models.Network.HostInformationResult}
      description: A <xref href="InventarWorkerCommon.Models.Network.HostInformationResult" data-throw-if-not-resolved="false"></xref> object containing host name, aliases, address list, or an error message if the resolution fails.
