  assemblies:
  - CtrlWorkerCommon
  namespace: CtrlWorkerCommon.Controller
  summary: Starts the service for the specified operating system.
  remarks: >-
    This method checks the operating system at runtime and attempts to

    start the service using platform-specific logic. Supported platforms include

    Windows, Linux, macOS, and FreeBSD. If the current operating system is not

    supported, a <xref href="System.PlatformNotSupportedException" data-throw-if-not-resolved="false"></xref> will be thrown.
  example: []
  syntax:
    content: public void StartService()
    content.vb: Public Sub StartService()
  overload: CtrlWorkerCommon.Controller.CrossPlatformServiceController.StartService*
  exceptions:
  - type: System.PlatformNotSupportedException
    commentId: T:System.PlatformNotSupportedException
    description: Thrown when the method is executed on an unsupported platform.
