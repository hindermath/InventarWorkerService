  summary: >-
    Reads the most recent log entries from the service log file.

    If the log file does not exist or an error occurs during reading,

    the method returns an empty list.
  example: []
  syntax:
    content: public List<string> ReadRecentLogs(int maxLines = 10)
    parameters:
    - id: maxLines
      type: System.Int32
      description: The maximum number of recent log lines to read. Defaults to 10.
