  assemblies:
  - InventarWorkerCommon
  namespace: InventarWorkerCommon.Services.Paths
  summary: Retrieves the base path of the system depending on the operating system.
  example: []
  syntax:
    content: public static string GetBasePath()
    return:
      type: System.String
      description: >-
        Returns the base directory path as a string.

        For Windows, it is the common application data directory.

        For MacOS, it is the shared users directory.

        For other operating systems, it defaults to '/var/tmp'.
    content.vb: Public Shared Function GetBasePath() As String
